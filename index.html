<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>seamonster CRM 메시지 맵</title>
<style>
  :root {
    --navy: #0B1D3A;
    --navy-mid: #1A2E4A;
    --canvas-bg: #E8E6E1;
    --canvas-dot: #D5D3CC;
    --white: #FFFFFF;
    --gray-50: #FAFAF8;
    --gray-100: #F1EFE8;
    --gray-200: #E2E0D8;
    --gray-300: #D3D1C7;
    --gray-400: #918F87;
    --gray-500: #6B6A64;
    --gray-600: #4A4946;
    --gray-700: #333330;
    --gray-900: #1A1A18;
    --orange: #F15A30;
    --orange-light: #FEF0EC;
    --orange-dark: #C4441D;
    --green: #1D9E75;
    --green-bg: #E8F5EE;
    --green-dark: #0F6E56;
    --red: #D85A30;
    --red-bg: #FAECE7;
    --red-dark: #993C1D;
    --blue: #378ADD;
    --blue-bg: #E6F1FB;
    --blue-dark: #185FA5;
    --purple-bg: #EEEDFE;
    --purple-dark: #534AB7;
    --teal: #0F6E56;
    --teal-bg: #E1F5EE;
    --font: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: var(--font); background: var(--canvas-bg); color: var(--gray-900); -webkit-font-smoothing: antialiased; }
  #canvas-viewport {
    width: 100%; height: 100%; overflow: hidden; cursor: grab; position: relative;
    background-image: radial-gradient(circle, var(--canvas-dot) 1px, transparent 1px);
    background-size: 24px 24px;
  }
  #canvas-viewport.grabbing { cursor: grabbing; }
  #canvas {
    position: absolute; top: 0; left: 0;
    transform-origin: 0 0;
    will-change: transform;
  }
  .toolbar {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--navy); border-radius: 12px; padding: 8px 12px;
    display: flex; align-items: center; gap: 8px; z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }
  .toolbar button {
    width: 36px; height: 36px; border: none; border-radius: 8px;
    background: rgba(255,255,255,0.1); color: #fff; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-family: var(--font); transition: background 0.15s;
  }
  .toolbar button:hover { background: rgba(255,255,255,0.2); }
  .toolbar .zoom-display {
    font-size: 12px; color: rgba(255,255,255,0.6); min-width: 44px;
    text-align: center; font-weight: 600;
  }
  .toolbar .sep { width: 1px; height: 24px; background: rgba(255,255,255,0.15); }
  .toolbar .brand { font-size: 12px; color: rgba(255,255,255,0.4); font-weight: 600; letter-spacing: -0.3px; margin-left: 4px; }
  .toolbar .brand span { color: #fff; }
  .top-bar {
    position: fixed; top: 0; left: 0; right: 0; height: 48px; z-index: 100;
    background: var(--navy); display: flex; align-items: center; padding: 0 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .top-bar-brand { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  .top-bar-brand span { color: #fff; }
  .top-bar-title { font-size: 14px; color: rgba(255,255,255,0.7); margin-left: 16px; font-weight: 500; }
  .top-bar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .top-filter {
    font-size: 11px; padding: 5px 12px; border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.15); background: transparent;
    color: rgba(255,255,255,0.5); cursor: pointer; font-family: var(--font); font-weight: 500;
  }
  .top-filter:hover { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.7); }
  .top-filter.on { background: var(--orange); color: #fff; border-color: var(--orange); }
  .filter-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.15); flex-shrink: 0; }
  .tag-filters { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .tag-filter {
    font-size: 10px; padding: 4px 10px; border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.2); background: transparent;
    color: rgba(255,255,255,0.5); cursor: pointer; font-family: var(--font); font-weight: 500;
  }
  .tag-filter:hover { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.8); }
  .tag-filter.on { background: rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.4); }
  .top-bar-search {
    padding: 5px 12px; border: 1px solid rgba(255,255,255,0.15); border-radius: 100px;
    font-size: 11px; font-family: var(--font); width: 140px; background: rgba(255,255,255,0.06);
    color: #fff;
  }
  .top-bar-search:focus { outline: none; border-color: var(--orange); }
  .top-bar-search::placeholder { color: rgba(255,255,255,0.3); }
  .minimap {
    position: fixed; bottom: 72px; right: 20px; width: 200px; height: 120px;
    background: var(--white); border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    z-index: 100; overflow: hidden; border: 1px solid var(--gray-200);
  }
  .minimap canvas { width: 100%; height: 100%; display: block; }
  .minimap-viewport {
    position: absolute; border: 2px solid var(--orange); border-radius: 2px;
    pointer-events: none;
  }
  .minimap-label { position: absolute; top: 4px; left: 8px; font-size: 9px; color: var(--gray-400); font-weight: 600; letter-spacing: 0.5px; }
  .stage-col { position: absolute; top: 0; display: flex; flex-direction: column; }
  .stage-header-card {
    width: 300px; padding: 16px 20px; background: var(--navy); color: #fff;
    border-radius: 12px; margin-bottom: 12px;
    box-shadow: 0 4px 16px rgba(11,29,58,0.3);
  }
  .stage-header-card .sh-num { font-size: 11px; color: var(--orange); font-weight: 700; margin-bottom: 2px; letter-spacing: 0.5px; }
  .stage-header-card .sh-name { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .stage-header-card .sh-sub { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 2px; }
  .stage-header-card .sh-counts { display: flex; gap: 10px; margin-top: 8px; }
  .stage-header-card .sh-count { font-size: 11px; font-weight: 600; }
  .sh-count.green { color: #5DCAA5; }
  .sh-count.red { color: #F09595; }
  .sh-count.blue { color: #85B7EB; }
  .msg-node {
    width: 300px; background: var(--white); border-radius: 10px;
    margin-bottom: 10px; overflow: hidden;
    border: 1px solid var(--gray-200);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .msg-node:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.12); border-color: var(--gray-300); }
  .msg-node.active-node { border-left: 4px solid var(--green); }
  .msg-node.gap-node { border-left: 4px solid var(--red); }
  .msg-node.auto-node { border-left: 4px solid var(--blue); }
  .msg-node.collapsed .node-detail,
  .msg-node.collapsed .node-perf,
  .msg-node.collapsed .node-msg,
  .msg-node.collapsed .node-img,
  .msg-node.collapsed .node-links { display: none; }
  .msg-node.collapsed .node-header { padding: 8px 14px; }
  .msg-node.collapsed { cursor: pointer; }
  .node-toggle { display: inline-block; font-size: 9px; color: var(--gray-400); margin-left: 4px; transition: transform 0.2s; }
  .msg-node.collapsed .node-toggle { transform: rotate(-90deg); }
  .node-header { padding: 12px 14px; }
  .node-top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .node-title { font-size: 13.5px; font-weight: 700; letter-spacing: -0.2px; color: var(--gray-900); }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 100px; font-weight: 600; white-space: nowrap; }
  .tag-kakao { background: #FFF8E1; color: #8D6E00; }
  .tag-leaflet { background: var(--green-bg); color: var(--green-dark); }
  .tag-cafe24 { background: var(--blue-bg); color: var(--blue-dark); }
  .tag-manual { background: var(--gray-100); color: var(--gray-600); }
  .tag-custom { background: #F0EBF8; color: #6B45B0; }
  .tag-s-active { background: var(--green-bg); color: var(--green-dark); }
  .tag-s-gap { background: var(--red-bg); color: var(--red-dark); }
  .tag-s-auto { background: var(--blue-bg); color: var(--blue-dark); }
  .node-timing { font-size: 10.5px; color: var(--gray-500); margin-left: auto; font-weight: 600; }
  .node-detail { font-size: 11.5px; color: var(--gray-600); margin-top: 6px; line-height: 1.6; }
  .node-perf { display: flex; gap: 2px; padding: 0 14px 10px; flex-wrap: wrap; }
  .np-item { flex: 1; min-width: 60px; padding: 6px 8px; background: var(--gray-50); border-radius: 6px; text-align: center; }
  .np-label { font-size: 10px; color: var(--gray-500); font-weight: 600; }
  .np-val { font-size: 13px; font-weight: 700; color: var(--navy); margin-top: 1px; }
  .node-msg {
    border-top: 1px solid var(--gray-100); padding: 10px 14px;
    background: var(--gray-50);
  }
  .node-msg-label { font-size: 10px; font-weight: 700; color: var(--gray-500); margin-bottom: 6px; letter-spacing: 0.5px; }
  .node-msg-text { font-size: 12px; line-height: 1.7; white-space: pre-line; color: var(--gray-700); max-height: 200px; overflow-y: auto; }
  .node-img { border-top: 1px solid var(--gray-100); padding: 10px 14px; }
  .node-img img { width: 100%; border-radius: 6px; border: 1px solid var(--gray-200); display: block; }
  .node-img-ph {
    width: 100%; aspect-ratio: 2; border-radius: 6px; border: 1px dashed var(--gray-300);
    display: flex; align-items: center; justify-content: center;
    color: var(--gray-400); font-size: 11px; background: var(--gray-100);
  }
  .node-links {
    border-top: 1px solid var(--gray-100); padding: 8px 14px;
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .node-link {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 600; padding: 5px 10px;
    border-radius: 6px; text-decoration: none;
    transition: opacity 0.15s;
    cursor: pointer;
  }
  .node-link:hover { opacity: 0.8; }
  .node-link-icon { font-size: 12px; }
  .link-solapi { background: #E8F5E9; color: #2E7D32; }
  .link-cafe24 { background: var(--blue-bg); color: var(--blue-dark); }
  .link-meta { background: #E3F2FD; color: #1565C0; }
  .link-sheets { background: #E8F5E9; color: #1B5E20; }
  .link-channel { background: #FFF8E1; color: #8D6E00; }
  .link-blog { background: var(--orange-light); color: var(--orange-dark); }
  .link-default { background: var(--gray-100); color: var(--gray-600); }
  .connector-svg {
    position: absolute; top: 0; left: 0; pointer-events: none; z-index: 0; overflow: visible;
  }
  .help-hint {
    position: fixed; top: 60px; right: 20px; font-size: 11px; color: var(--gray-400);
    background: var(--white); padding: 8px 14px; border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08); z-index: 90; line-height: 1.5;
    border: 1px solid var(--gray-200);
  }
  .help-hint kbd { background: var(--gray-100); padding: 1px 5px; border-radius: 3px; font-size: 10px; font-family: var(--font); border: 1px solid var(--gray-200); }
</style>

<body>
<div class="top-bar">
  <div class="top-bar-brand"><span>sea</span>monster</div>
  <div class="top-bar-title">CRM 메시지 맵</div>
  <div class="top-bar-right">
    <button class="top-filter on" data-f="all" onclick="setFilter('all')">전체</button>
    <button class="top-filter" data-f="active" onclick="setFilter('active')">운영 중</button>
    <button class="top-filter" data-f="auto" onclick="setFilter('auto')">자동</button>
    <button class="top-filter" data-f="gap" onclick="setFilter('gap')">빈 구간</button>
    <div class="filter-sep"></div>
    <div class="tag-filters" id="tagFilters"></div>
    <input type="text" class="top-bar-search" placeholder="검색..." oninput="setSearch(this.value)" />
  </div>
</div>
<div class="help-hint" id="helpHint">
  <kbd>스크롤</kbd> 확대/축소 &nbsp; <kbd>드래그</kbd> 이동 &nbsp; <kbd>더블클릭</kbd> 확대 &nbsp; <kbd>카드 클릭</kbd> 접기/펼치기
</div>
<div id="canvas-viewport">
  <div id="canvas"></div>
</div>
<div class="minimap">
  <canvas id="minimapCanvas"></canvas>
  <div class="minimap-viewport" id="minimapVP"></div>
  <div class="minimap-label">OVERVIEW</div>
</div>
<div class="toolbar">
  <div class="brand"><span>sea</span>monster</div>
  <div class="sep"></div>
  <button onclick="zoomTo(scale-0.15)" title="축소">-</button>
  <div class="zoom-display" id="zoomDisplay">100%</div>
  <button onclick="zoomTo(scale+0.15)" title="확대">+</button>
  <div class="sep"></div>
  <button onclick="fitAll()" title="전체 보기" style="font-size:13px;">FIT</button>
  <button onclick="zoomTo(1)" title="100%" style="font-size:11px;">1:1</button>
  <div class="sep"></div>
  <button onclick="toggleAll()" id="toggleBtn" title="전체 펼치기/접기" style="font-size:11px;width:auto;padding:0 12px;">접기</button>
  <div class="sep"></div>
  <button onclick="refreshData()" id="refreshBtn" title="시트 데이터 새로고침" style="font-size:11px;width:auto;padding:0 12px;">새로고침</button>
</div>
<script>
// ── 링크 타입 설정 ──
var LINK_TYPES = {
  solapi:  { label: "솔라피",       icon: "📨", cls: "link-solapi" },
  cafe24:  { label: "카페24 관리자", icon: "🛒", cls: "link-cafe24" },
  meta:    { label: "메타 광고",     icon: "📢", cls: "link-meta" },
  sheets:  { label: "Google Sheets", icon: "📊", cls: "link-sheets" },
  channel: { label: "카카오채널",    icon: "💬", cls: "link-channel" },
  blog:    { label: "블로그",        icon: "📝", cls: "link-blog" }
};

// ══════════════════════════════════════════════════════════
// Google Sheets 연동 설정
// ──────────────────────────────────────────────────────────
// 1. Google Sheets에서 XLSX 템플릿을 업로드하거나 사본을 만듭니다
// 2. 파일 > 공유 > 웹에 게시 > "메시지 맵" 시트 > CSV 형식 > 게시
// 3. 아래 SHEET_CSV_URL에 생성된 URL을 붙여넣습니다
// 4. 시트를 수정하면 HTML 맵이 자동으로 반영됩니다 (새로고침 시)
// ══════════════════════════════════════════════════════════
var SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQhfjsth5p4DlO5ID9aJtkTWjoqtkHhwuNZhzjFWornrRbOcZXhQgB5fefUwAAzsQ/pub?gid=1827533123&single=true&output=csv"; // ← 여기에 Google Sheets 웹 게시 CSV URL 붙여넣기

var DATA = [];

// CSV 파싱 (줄바꿈/쉼표/따옴표 처리)
function parseCSV(text) {
  var rows = [], row = [], field = "", inQuote = false;
  for (var i = 0; i < text.length; i++) {
    var c = text[i], next = text[i+1];
    if (inQuote) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuote = false; }
      else { field += c; }
    } else {
      if (c === '"') { inQuote = true; }
      else if (c === ',') { row.push(field); field = ""; }
      else if (c === '\r' && next === '\n') { row.push(field); field = ""; rows.push(row); row = []; i++; }
      else if (c === '\n') { row.push(field); field = ""; rows.push(row); row = []; }
      else { field += c; }
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

// CSV 행들을 DATA 구조로 변환
function csvToData(rows) {
  if (rows.length < 2) return [];
  var header = rows[0].map(function(h){ return h.trim().toLowerCase(); });
  var ci = {};
  header.forEach(function(h, i){ ci[h] = i; });

  // 한글 헤더 매핑
  var colMap = {
    '스테이지': 'stage', '부제': 'sub', '메시지명': 'title',
    '상태': 'status', '채널': 'channel', '발송시점': 'timing',
    '상세설명': 'detail', '메시지 내용/초안': 'msg', '이미지url': 'img_url',
    '솔라피 url': 'link_solapi', '카페24 url': 'link_cafe24',
    '메타광고 url': 'link_meta', 'sheets url': 'link_sheets',
    '카카오채널 url': 'link_channel', '블로그 url': 'link_blog',
    '발송수': 'perf_sent', '도달': 'perf_reached', '열람': 'perf_opened',
    '클릭': 'perf_clicked', '전환': 'perf_converted', '매출': 'perf_revenue',
    '태그': 'tags', '스테이지번호': 'stage_num'
  };
  header.forEach(function(h, i){
    if (colMap[h]) ci[colMap[h]] = i;
    else ci[h] = i;
  });

  function g(row, key) { return ci[key] !== undefined && row[ci[key]] !== undefined ? row[ci[key]].trim() : ""; }
  function gn(row, key) { var v = g(row, key); return v ? parseInt(v, 10) : null; }

  var stages = {};
  var stageOrder = [];

  for (var r = 1; r < rows.length; r++) {
    var row = rows[r];
    if (!row || row.length < 3) continue;
    var stage = g(row, "stage");
    var sub = g(row, "sub");
    if (!stage) continue;

    if (!stages[stage]) {
      var stageNum = g(row, "stage_num");
      stages[stage] = { stage: stage, sub: sub, stageNum: stageNum, msgs: [] };
      stageOrder.push(stage);
    }

    var links = [];
    ["solapi","cafe24","meta","sheets","channel","blog"].forEach(function(lt) {
      var url = g(row, "link_" + lt);
      if (url || ci["link_" + lt] !== undefined) {
        links.push({ type: lt, url: url });
      }
    });

    var sent = gn(row, "perf_sent");
    var perf = null;
    if (sent) {
      perf = {
        sent: sent,
        reached: gn(row, "perf_reached"),
        opened: gn(row, "perf_opened"),
        clicked: gn(row, "perf_clicked"),
        converted: gn(row, "perf_converted"),
        revenue: gn(row, "perf_revenue")
      };
    }

    var tagsRaw = g(row, "tags");
    var tags = tagsRaw ? tagsRaw.split(/[,\/]/).map(function(t){ return t.trim(); }).filter(Boolean) : [];

    stages[stage].msgs.push({
      title: g(row, "title"),
      status: g(row, "status") || "gap",
      ch: g(row, "channel") || "manual",
      timing: g(row, "timing"),
      detail: g(row, "detail"),
      msg: g(row, "msg"),
      img: g(row, "img_url"),
      perf: perf,
      links: links,
      tags: tags
    });
  }

  return stageOrder.map(function(s){ return stages[s]; });
}

// Sheets에서 데이터 로드 (실패 시 폴백 데이터 사용)
function loadData(callback) {
  if (!SHEET_CSV_URL) {
    console.log("SHEET_CSV_URL이 비어있습니다. 기본 데이터를 사용합니다.");
    DATA = getFallbackData();
    callback();
    return;
  }
  var url = SHEET_CSV_URL;
  // 캐시 방지
  url += (url.indexOf("?") > -1 ? "&" : "?") + "_t=" + Date.now();

  fetch(url)
    .then(function(res) {
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.text();
    })
    .then(function(csv) {
      var rows = parseCSV(csv);
      var parsed = csvToData(rows);
      if (parsed.length > 0) {
        DATA = parsed;
        console.log("Google Sheets에서 " + DATA.length + "개 스테이지 로드 완료");
      } else {
        console.warn("시트 데이터가 비어있습니다. 기본 데이터를 사용합니다.");
        DATA = getFallbackData();
      }
      callback();
    })
    .catch(function(err) {
      console.error("Sheets 로드 실패:", err, "— 기본 데이터를 사용합니다.");
      DATA = getFallbackData();
      callback();
    });
}

// 폴백 데이터 (Sheets 미연결 시 사용)
function getFallbackData() {

var CH_LABEL = { kakao:"알림톡", leaflet:"리플렛", cafe24:"카페24", manual:"수동" };
var CH_CLS = { kakao:"tag-kakao", leaflet:"tag-leaflet", cafe24:"tag-cafe24", manual:"tag-manual" };
var ST_CLS = { active:"tag-s-active", gap:"tag-s-gap", auto:"tag-s-auto" };
var ST_LBL = { active:"운영 중", gap:"빈 구간", auto:"자동" };

var scale = 0.55;
var panX = 80, panY = 80;
var dragging = false, dragStartX, dragStartY, panStartX, panStartY;
var didDrag = false;
var activeFilter = "all", searchQuery = "";
var activeTag = "all";
var COL_W = 320, COL_GAP = 24, START_X = 0, START_Y = 0;
var allExpanded = true;

function pct(a,b){ return b>0? Math.round(a/b*100):0; }
function fmt(n){ return n? n.toLocaleString("ko-KR"):"-"; }

// 태그 필터 버튼 생성
function buildTagFilters() {
  var allTags = {};
  DATA.forEach(function(s) {
    s.msgs.forEach(function(m) {
      if (m.tags) m.tags.forEach(function(t) { allTags[t] = (allTags[t] || 0) + 1; });
    });
  });
  var container = document.getElementById("tagFilters");
  container.innerHTML = "";
  var tagNames = Object.keys(allTags).sort();
  if (tagNames.length === 0) return;
  var allBtn = document.createElement("button");
  allBtn.className = "tag-filter" + (activeTag === "all" ? " on" : "");
  allBtn.textContent = "전체 태그";
  allBtn.onclick = function() { setTag("all"); };
  container.appendChild(allBtn);
  tagNames.forEach(function(t) {
    var btn = document.createElement("button");
    btn.className = "tag-filter" + (activeTag === t ? " on" : "");
    btn.textContent = t + " " + allTags[t];
    btn.onclick = function() { setTag(t); };
    container.appendChild(btn);
  });
}

window.setTag = function(t) {
  activeTag = t;
  buildCanvas();
};

window.refreshData = function() {
  var btn = document.getElementById("refreshBtn");
  btn.textContent = "로딩...";
  btn.style.opacity = "0.5";
  loadData(function() {
    buildCanvas();
    btn.textContent = "새로고침";
    btn.style.opacity = "1";
  });
};

function buildLinkHTML(linksArr) {
  if (!linksArr || linksArr.length === 0) return "";
  var html = '<div class="node-links">';
  linksArr.forEach(function(lk) {
    var info = LINK_TYPES[lk.type] || { label: lk.type, icon: "🔗", cls: "link-default" };
    var hasUrl = lk.url && lk.url.length > 0;
    if (hasUrl) {
      html += '<a class="node-link ' + info.cls + '" href="' + lk.url + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">';
    } else {
      html += '<span class="node-link ' + info.cls + '" style="opacity:0.45;cursor:default" title="URL 미등록">';
    }
    html += '<span class="node-link-icon">' + info.icon + '</span>' + info.label;
    if (hasUrl) {
      html += ' ↗</a>';
    } else {
      html += '</span>';
    }
  });
  html += '</div>';
  return html;
}

function buildCanvas() {
  var canvas = document.getElementById("canvas");
  canvas.innerHTML = "";
  var sq = searchQuery.toLowerCase();

  DATA.forEach(function(s, si) {
    var filtered = s.msgs.filter(function(m){
      var sok = activeFilter==="all"||m.status===activeFilter;
      var qok = !sq||m.title.toLowerCase().indexOf(sq)>=0||m.detail.toLowerCase().indexOf(sq)>=0||m.msg.toLowerCase().indexOf(sq)>=0;
      var tok = activeTag==="all"||( m.tags && m.tags.indexOf(activeTag)>=0 );
      return sok&&qok&&tok;
    });
    var col = document.createElement("div");
    col.className = "stage-col";
    col.style.left = (START_X + si*(COL_W+COL_GAP)) + "px";
    col.style.top = START_Y + "px";

    var aN=0,gN=0,auN=0;
    filtered.forEach(function(m){ if(m.status==="active")aN++; else if(m.status==="gap")gN++; else if(m.status==="auto")auN++; });

    var stageLabel = s.stageNum || (si+1);
    var hdr = '<div class="stage-header-card"><div class="sh-num">STAGE ' + stageLabel + '</div><div class="sh-name">' + s.stage + '</div><div class="sh-sub">' + s.sub + '</div><div class="sh-counts">';
    if(aN) hdr+='<span class="sh-count green">운영 '+aN+'</span>';
    if(auN) hdr+='<span class="sh-count blue">자동 '+auN+'</span>';
    if(gN) hdr+='<span class="sh-count red">빈 구간 '+gN+'</span>';
    hdr+='</div></div>';
    col.innerHTML = hdr;

    filtered.forEach(function(m) {
      var node = document.createElement("div");
      node.className = "msg-node " + m.status + "-node" + (allExpanded ? "" : " collapsed");
      node.addEventListener("click", function(e){ if(didDrag || e.target.closest(".node-msg-text") || e.target.closest(".node-link")) return; node.classList.toggle("collapsed"); });

      var tagHTML = "";
      if (m.tags && m.tags.length) { m.tags.forEach(function(t){ tagHTML += '<span class="tag tag-custom">' + t + '</span>'; }); }
      var h = '<div class="node-header"><div class="node-top"><span class="node-title">' + m.title + ' <span class="node-toggle">&#9660;</span></span><span class="tag ' + ST_CLS[m.status] + '">' + ST_LBL[m.status] + '</span><span class="tag ' + CH_CLS[m.ch] + '">' + CH_LABEL[m.ch] + '</span>' + tagHTML + '<span class="node-timing">' + m.timing + '</span></div><div class="node-detail">' + m.detail + '</div></div>';

      if (m.perf) {
        var p=m.perf;
        h+='<div class="node-perf"><div class="np-item"><div class="np-label">발송</div><div class="np-val">'+fmt(p.sent)+'</div></div><div class="np-item"><div class="np-label">열람률</div><div class="np-val">'+pct(p.opened,p.reached)+'%</div></div><div class="np-item"><div class="np-label">CTR</div><div class="np-val">'+pct(p.clicked,p.opened)+'%</div></div><div class="np-item"><div class="np-label">전환</div><div class="np-val">'+pct(p.converted,p.clicked)+'%</div></div></div>';
      }
      if (m.msg) {
        var lb = m.status==="gap"?"초안":"현재 문구";
        h+='<div class="node-msg"><div class="node-msg-label">'+lb+'</div><div class="node-msg-text">'+m.msg+'</div></div>';
      }
      if (m.img==="placeholder") {
        h+='<div class="node-img"><div class="node-img-ph">이미지를 등록하세요</div></div>';
      } else if (m.img) {
        h+='<div class="node-img"><img src="'+m.img+'" onerror="this.parentElement.innerHTML=\'<div class=node-img-ph>로드 실패</div>\'" /></div>';
      }

      h += buildLinkHTML(m.links);

      node.innerHTML = h;
      col.appendChild(node);
    });
    canvas.appendChild(col);
  });
  drawConnectors();
  applyTransform();
  updateMinimap();
  buildTagFilters();
}

// ── 커넥터 화살표 ──
function drawConnectors() {
  var existing = document.querySelector(".connector-svg");
  if (existing) existing.remove();

  var stageCount = DATA.length;
  if (stageCount < 2) return;

  var totalW = stageCount * (COL_W + COL_GAP);
  var svgNS = "http://www.w3.org/2000/svg";
  var svg = document.createElementNS(svgNS, "svg");
  svg.setAttribute("class", "connector-svg");
  svg.setAttribute("width", totalW);
  svg.setAttribute("height", 80);
  svg.style.top = "20px";

  // 화살표 마커 정의
  var defs = document.createElementNS(svgNS, "defs");
  var marker = document.createElementNS(svgNS, "marker");
  marker.setAttribute("id", "arrowhead");
  marker.setAttribute("markerWidth", "8");
  marker.setAttribute("markerHeight", "6");
  marker.setAttribute("refX", "8");
  marker.setAttribute("refY", "3");
  marker.setAttribute("orient", "auto");
  var polygon = document.createElementNS(svgNS, "polygon");
  polygon.setAttribute("points", "0 0, 8 3, 0 6");
  polygon.setAttribute("fill", "#0B1D3A");
  polygon.setAttribute("opacity", "0.35");
  marker.appendChild(polygon);
  defs.appendChild(marker);
  svg.appendChild(defs);

  for (var i = 0; i < stageCount - 1; i++) {
    var x1 = START_X + i * (COL_W + COL_GAP) + COL_W;
    var x2 = START_X + (i + 1) * (COL_W + COL_GAP);
    var y = 28;
    var line = document.createElementNS(svgNS, "line");
    line.setAttribute("x1", x1 + 4);
    line.setAttribute("y1", y);
    line.setAttribute("x2", x2 - 4);
    line.setAttribute("y2", y);
    line.setAttribute("stroke", "#0B1D3A");
    line.setAttribute("stroke-width", "2");
    line.setAttribute("stroke-dasharray", "6 4");
    line.setAttribute("opacity", "0.25");
    line.setAttribute("marker-end", "url(#arrowhead)");
    svg.appendChild(line);
  }

  document.getElementById("canvas").appendChild(svg);
}

// ── 미니맵 ──
function updateMinimap() {
  var mc = document.getElementById("minimapCanvas");
  var ctx = mc.getContext("2d");
  var mw = 200, mh = 120;
  mc.width = mw * 2; mc.height = mh * 2;
  ctx.scale(2, 2);
  ctx.clearRect(0, 0, mw, mh);

  var totalW = DATA.length * (COL_W + COL_GAP);
  var totalH = 2200;
  var sx = mw / totalW;
  var sy = mh / totalH;
  var ms = Math.min(sx, sy) * 0.85;

  var offsetX = (mw - totalW * ms) / 2;
  var offsetY = 4;

  DATA.forEach(function(s, si) {
    var x = offsetX + si * (COL_W + COL_GAP) * ms;
    var y = offsetY;
    // header
    ctx.fillStyle = "#0B1D3A";
    ctx.fillRect(x, y, COL_W * ms, 12);
    // nodes
    var ny = y + 14;
    var filtered = s.msgs.filter(function(m){
      var sok = activeFilter==="all"||m.status===activeFilter;
      return sok;
    });
    filtered.forEach(function(m) {
      var color = m.status === "active" ? "#1D9E75" : m.status === "gap" ? "#D85A30" : "#378ADD";
      ctx.fillStyle = color;
      var nh = allExpanded ? 18 : 6;
      ctx.fillRect(x, ny, COL_W * ms, nh);
      ny += nh + 2;
    });
  });

  // viewport indicator
  var vw = window.innerWidth;
  var vh = window.innerHeight - 48;
  var vpX = offsetX + (-panX / scale) * ms;
  var vpY = offsetY + (-panY / scale + 48 / scale) * ms;
  var vpW = (vw / scale) * ms;
  var vpH = (vh / scale) * ms;

  var mvp = document.getElementById("minimapVP");
  mvp.style.left = Math.max(0, vpX) + "px";
  mvp.style.top = Math.max(0, vpY) + "px";
  mvp.style.width = Math.min(vpW, mw) + "px";
  mvp.style.height = Math.min(vpH, mh) + "px";
}

function applyTransform() {
  var c = document.getElementById("canvas");
  c.style.transform = "translate("+panX+"px,"+panY+"px) scale("+scale+")";
  document.getElementById("zoomDisplay").textContent = Math.round(scale*100)+"%";
  updateMinimap();
}

window.zoomTo = function(s) {
  scale = Math.max(0.15, Math.min(2, s));
  applyTransform();
};

window.fitAll = function() {
  var totalW = DATA.length * (COL_W+COL_GAP);
  var vw = window.innerWidth, vh = window.innerHeight - 48;
  scale = Math.min(vw / (totalW+160), vh / 2400, 0.7);
  panX = 60; panY = 70;
  applyTransform();
};

window.setFilter = function(f) {
  activeFilter = f;
  document.querySelectorAll(".top-filter").forEach(function(b){ b.classList.toggle("on", b.dataset.f===f); });
  buildCanvas();
};
window.setSearch = function(v) { searchQuery=v; buildCanvas(); };

window.toggleAll = function() {
  allExpanded = !allExpanded;
  document.getElementById("toggleBtn").textContent = allExpanded ? "접기" : "펼치기";
  document.querySelectorAll(".msg-node").forEach(function(n) {
    if (allExpanded) n.classList.remove("collapsed");
    else n.classList.add("collapsed");
  });
  updateMinimap();
};

// ── 팬/줌 이벤트 ──
var vp = document.getElementById("canvas-viewport");

vp.addEventListener("wheel", function(e) {
  e.preventDefault();
  var rect = vp.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  var oldScale = scale;
  var delta = e.deltaY > 0 ? -0.08 : 0.08;
  scale = Math.max(0.15, Math.min(2, scale + delta));
  panX = mx - (mx - panX) * (scale / oldScale);
  panY = my - (my - panY) * (scale / oldScale);
  applyTransform();
}, { passive: false });

vp.addEventListener("mousedown", function(e) {
  if (e.button !== 0) return;
  dragging = true; didDrag = false;
  dragStartX = e.clientX; dragStartY = e.clientY;
  panStartX = panX; panStartY = panY;
  vp.classList.add("grabbing");
});

window.addEventListener("mousemove", function(e) {
  if (!dragging) return;
  var dx = e.clientX - dragStartX, dy = e.clientY - dragStartY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didDrag = true;
  panX = panStartX + dx;
  panY = panStartY + dy;
  applyTransform();
});

window.addEventListener("mouseup", function() {
  dragging = false;
  vp.classList.remove("grabbing");
  setTimeout(function(){ didDrag = false; }, 50);
});

vp.addEventListener("dblclick", function(e) {
  var rect = vp.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  var oldScale = scale;
  scale = Math.min(2, scale * 1.5);
  panX = mx - (mx - panX) * (scale / oldScale);
  panY = my - (my - panY) * (scale / oldScale);
  applyTransform();
});

// ── 터치 ──
var touchDist = 0, touchMid = null;
vp.addEventListener("touchstart", function(e) {
  if (e.touches.length === 1) {
    dragging = true;
    dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
    panStartX = panX; panStartY = panY;
  } else if (e.touches.length === 2) {
    dragging = false;
    var dx = e.touches[0].clientX - e.touches[1].clientX;
    var dy = e.touches[0].clientY - e.touches[1].clientY;
    touchDist = Math.sqrt(dx*dx+dy*dy);
    touchMid = { x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2 };
  }
}, { passive: false });

vp.addEventListener("touchmove", function(e) {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    panX = panStartX + (e.touches[0].clientX - dragStartX);
    panY = panStartY + (e.touches[0].clientY - dragStartY);
    applyTransform();
  } else if (e.touches.length === 2 && touchDist > 0) {
    var dx = e.touches[0].clientX - e.touches[1].clientX;
    var dy = e.touches[0].clientY - e.touches[1].clientY;
    var nd = Math.sqrt(dx*dx+dy*dy);
    var r = nd/touchDist;
    var oldScale = scale;
    scale = Math.max(0.15, Math.min(2, scale*r));
    var rect = vp.getBoundingClientRect();
    var mx = touchMid.x - rect.left;
    var my = touchMid.y - rect.top;
    panX = mx - (mx-panX)*(scale/oldScale);
    panY = my - (my-panY)*(scale/oldScale);
    touchDist = nd;
    applyTransform();
  }
}, { passive: false });

vp.addEventListener("touchend", function() { dragging=false; touchDist=0; });

// ── 힌트 자동 숨김 ──
setTimeout(function(){ document.getElementById("helpHint").style.opacity="0"; document.getElementById("helpHint").style.transition="opacity 1s"; setTimeout(function(){ document.getElementById("helpHint").style.display="none"; },1000); }, 5000);

// ── 초기화 ──
loadData(function() {
  buildCanvas();
  fitAll();
});
</script>
</body>
